{% extends "base.html" %}

{% block title %}注册 - 在线投票系统{% endblock %}

{% block content %}
<div class="page-header">
    <h2>用户注册</h2>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('register') }}" class="form register-form">
        <div class="form-group">
            <label for="username" class="form-label">用户名</label>
            <input type="text" id="username" name="username" class="form-input" placeholder="请输入用户名（3-20个字符）" required>
            <span class="form-hint">用户名长度应在3-20个字符之间</span>
        </div>

        <div class="form-group">
            <label for="password" class="form-label">密码</label>
            <input type="password" id="password" name="password" class="form-input" placeholder="请输入密码（至少6个字符）" required>
            <span class="form-hint">密码长度至少6个字符</span>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary btn-lg">注册</button>
            <a href="{{ url_for('login') }}" class="btn btn-secondary btn-lg">登录</a>
        </div>
    </form>
</div>
{% endblock %}

{% block extra_css %}
<style>
.form-container {
    max-width: 500px;
    margin: 0 auto;
}

.register-form {
    background-color: #fff;
    padding: 30px;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
}
</style>
{% endblock %}
