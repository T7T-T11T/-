{% extends "base.html" %}

{% block title %}登录 - 在线投票系统{% endblock %}

{% block content %}
<div class="page-header">
    <h2>用户登录</h2>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('login') }}" class="form login-form">
        <div class="form-group">
            <label for="username" class="form-label">用户名</label>
            <input type="text" id="username" name="username" class="form-input" placeholder="请输入用户名" required>
        </div>

        <div class="form-group">
            <label for="password" class="form-label">密码</label>
            <input type="password" id="password" name="password" class="form-input" placeholder="请输入密码" required>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary btn-lg">登录</button>
        </div>
    </form>
</div>
{% endblock %}

{% block extra_css %}
<style>
.form-container {
    max-width: 500px;
    margin: 0 auto;
}

.login-form {
    background-color: #fff;
    padding: 30px;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 20px;
}

.login-info {
    background-color: var(--light-bg);
    padding: 20px;
    border-radius: var(--radius);
    border: 1px solid var(--border-color);
}

.login-info p {
    margin: 10px 0;
}

.login-info strong {
    color: var(--primary-color);
}
</style>
{% endblock %}
